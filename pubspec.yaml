name: assistant_app
description: Personal productivity assistant — tasks, notes, calendar.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  drag_and_drop_lists: ^0.4.2
  google_mlkit_text_recognition: ^0.13.0
  flutter_secure_storage: ^9.0.0
  flutter_sound: ^9.2.13
  image_picker: ^1.1.0
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_sign_in: ^6.2.0
  googleapis: ^13.0.0
  http: ^1.2.0
  dio: ^5.4.0
  uuid: ^4.4.0
  intl: ^0.19.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  mockito: ^5.4.4
  integration_test:
    sdk: flutter
